name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    # "labeled" added so adding run-integration-tests to an open PR (see the
    # `integration` job below) actually triggers a run, not just the next push.
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x

    - name: Set up protoc
      run: |
        wget https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip
        unzip protoc-28.3-linux-x86_64.zip
        sudo mv bin/protoc /usr/local/bin/protoc
        sudo mv include/* /usr/local/include/

    - name: Install protoc-gen-go
      run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.28.1

    - name: Generated protofiles are up to date
      run: |
        make generate-protos
        git diff --exit-code

    - name: No formatting changes
      run: |
        make format
        git diff --exit-code

    - name: Install ZMQ
      run: sudo apt update -y && sudo apt upgrade -y && sudo apt install libsodium-dev libzmq3-dev

    - name: Setup golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2

    - name: Linter passes
      run: make linters

    - name: Test
      run: make test

  # Opt-in only: docker-compose brings up kafka/kinesis/pubsub/mqtt/zookeeper
  # (5 of 9 containers) purely to exercise dispatchers we don't run in
  # production (NATS is our only production dispatcher, and it's already
  # covered end-to-end by the embedded-server specs in `make test`, see
  # datastore/nats/nats_e2e_test.go). Trigger manually via
  # `gh workflow run build.yml` / the Actions "Run workflow" button, or by
  # adding the `run-integration-tests` label to a PR.
  integration:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x

    - name: Integration Test
      run: make integration
